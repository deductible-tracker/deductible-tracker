name: Build and Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.set-image-ref.outputs.image_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare DB wallet from secret
        env:
          WALLET_ZIP_BASE64: ${{ secrets.WALLET_ZIP_BASE64 }}
          WALLET_ZIP_SHA256: ${{ secrets.WALLET_ZIP_SHA256 }}
        run: |
          set -euo pipefail
          if [ -n "$WALLET_ZIP_BASE64" ]; then
            rm -rf Wallet_deductibledb
            mkdir -p Wallet_deductibledb /tmp/wallet-extract

            if ! command -v unzip >/dev/null 2>&1; then
              echo "unzip not found; installing unzip"
              sudo apt-get update
              sudo apt-get install -y unzip
            fi

            echo "WALLET_ZIP_BASE64 length (chars):" "$(echo -n "$WALLET_ZIP_BASE64" | wc -c)"
            printf '%s' "$WALLET_ZIP_BASE64" | tr -d '\r' > /tmp/wallet.b64

            if ! (base64 --decode /tmp/wallet.b64 > /tmp/wallet.zip 2>/dev/null) && ! (base64 -d /tmp/wallet.b64 > /tmp/wallet.zip 2>/dev/null); then
              echo "Failed to base64-decode WALLET_ZIP_BASE64" >&2
              exit 1
            fi

            echo "Decoded wallet zip bytes:" "$(stat -c%s /tmp/wallet.zip 2>/dev/null || wc -c < /tmp/wallet.zip)"
            file -b /tmp/wallet.zip || true

            if [ -n "${WALLET_ZIP_SHA256:-}" ]; then
              wallet_sha=$(sha256sum /tmp/wallet.zip | awk '{print $1}')
              if [ "$wallet_sha" != "$WALLET_ZIP_SHA256" ]; then
                echo "Wallet SHA256 mismatch. Expected $WALLET_ZIP_SHA256 but decoded $wallet_sha" >&2
                exit 1
              fi
              echo "Wallet SHA256 verified"
            fi

            if ! unzip -t /tmp/wallet.zip >/dev/null 2>&1; then
              echo "WALLET_ZIP_BASE64 decoded successfully but the resulting zip is corrupt." >&2
              echo "Recreate the secret from a file or with scripts/prepare-wallet-secret.sh instead of copying from terminal output." >&2
              unzip -l /tmp/wallet.zip || true
              exit 1
            fi

            unzip -qq /tmp/wallet.zip -d /tmp/wallet-extract

            if [ -d /tmp/wallet-extract/__MACOSX ]; then
              rm -rf /tmp/wallet-extract/__MACOSX
            fi

            shopt -s dotglob nullglob
            extracted_entries=(/tmp/wallet-extract/*)
            if [ "${#extracted_entries[@]}" -eq 1 ] && [ -d "${extracted_entries[0]}" ]; then
              cp -R "${extracted_entries[0]}"/* Wallet_deductibledb/
            else
              cp -R /tmp/wallet-extract/* Wallet_deductibledb/
            fi
            shopt -u dotglob nullglob

            for required_file in cwallet.sso tnsnames.ora sqlnet.ora ojdbc.properties; do
              if [ ! -f "Wallet_deductibledb/$required_file" ]; then
                echo "Decoded wallet archive is missing required file: $required_file" >&2
                find Wallet_deductibledb -maxdepth 2 -type f | sort
                exit 1
              fi
            done

            echo "Prepared wallet files:"
            find Wallet_deductibledb -maxdepth 1 -type f | sort
          else
            echo "No WALLET_ZIP_BASE64 secret found; creating empty Wallet_deductibledb folder"
            mkdir -p Wallet_deductibledb
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            PREBUILD_TESTS=0
            NODE_ENV=production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=deploy-arm64
          cache-to: type=gha,mode=max,scope=deploy-arm64
          provenance: false
          sbom: false

      - name: Set image_ref build output
        id: set-image-ref
        run: |
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    environment: production
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_FILE }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - name: Install OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: 'iam compartment list --limit 1'
          silent: false

      - name: Update Instance Metadata Tag to Trigger Deploy
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_WALLET_PASSWORD: ${{ secrets.DB_WALLET_PASSWORD }}
          DB_CONNECT_STRING: ${{ secrets.DB_CONNECT_STRING }}
          OBJECT_STORAGE_ENDPOINT: ${{ secrets.OBJECT_STORAGE_ENDPOINT }}
          OBJECT_STORAGE_BUCKET: ${{ secrets.OBJECT_STORAGE_BUCKET }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY_ID }}
          OCI_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          OAUTH_PROVIDERS: ${{ secrets.OAUTH_PROVIDERS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_AUTH_URL: ${{ secrets.GOOGLE_AUTH_URL }}
          GOOGLE_TOKEN_URL: ${{ secrets.GOOGLE_TOKEN_URL }}
          GOOGLE_USERINFO_URL: ${{ secrets.GOOGLE_USERINFO_URL }}
          GOOGLE_REDIRECT_URL: ${{ secrets.GOOGLE_REDIRECT_URL }}
          PROPUBLICA_API_BASE_URL: ${{ secrets.PROPUBLICA_API_BASE_URL }}
          MISTRAL_API_ENDPOINT: ${{ secrets.MISTRAL_API_ENDPOINT }}
          MISTRAL_MODEL: ${{ secrets.MISTRAL_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_OTLP_ENDPOINT: ${{ secrets.NEW_RELIC_OTLP_ENDPOINT }}
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_ref }}"

          # 1. Discover the active instance OCID
          TARGET_COMPARTMENT="${{ secrets.OCI_COMPARTMENT_OCID }}"
          : "${TARGET_COMPARTMENT:=$OCI_CLI_TENANCY}"

          echo "Searching for instances in compartment $TARGET_COMPARTMENT (including subtree)..."
          
          # Search by defined tags recursively. We look for any instance that has our Operations.deployed_image tag.
          INSTANCE_OCID=$(oci compute instance list --compartment-id "$TARGET_COMPARTMENT" \
            --lifecycle-state RUNNING \
            --compartment-id-in-subtree true \
            --query "data[?\"defined-tags\".Operations.deployed_image].id | [0]" --raw-output)

          if [ -z "$INSTANCE_OCID" ] || [ "$INSTANCE_OCID" == "null" ]; then
            echo "ERROR: No RUNNING instance with tag Operations.deployed_image found in compartment $TARGET_COMPARTMENT"
            # Fallback search by name if tag search fails
            echo "Attempting fallback search by name 'app_server'..."
            INSTANCE_OCID=$(oci compute instance list --compartment-id "$TARGET_COMPARTMENT" \
              --lifecycle-state RUNNING \
              --compartment-id-in-subtree true \
              --display-name "app_server" \
              --query "data[0].id" --raw-output)
          fi

          if [ -z "$INSTANCE_OCID" ] || [ "$INSTANCE_OCID" == "null" ]; then
            echo "ERROR: Could not find target instance for deployment."
            exit 1
          fi
          echo "Found active instance: $INSTANCE_OCID"

          # 2. Capture environment variables and encode them
          # Using a temporary file to avoid shell expansion issues and maintain formatting
          cat > /tmp/env_content <<EOF
DB_USER=$DB_USER
DB_PASSWORD=$DB_PASSWORD
DB_WALLET_PASSWORD=$DB_WALLET_PASSWORD
DB_CONNECT_STRING=$DB_CONNECT_STRING
GHCR_USERNAME=$GHCR_USERNAME
GHCR_TOKEN=$GHCR_TOKEN
DB_WALLET_DIR=/app/wallet
OBJECT_STORAGE_ENDPOINT=$OBJECT_STORAGE_ENDPOINT
OBJECT_STORAGE_BUCKET=$OBJECT_STORAGE_BUCKET
OCI_REGION=$OCI_REGION
OCI_ACCESS_KEY_ID=$OCI_ACCESS_KEY_ID
OCI_SECRET_ACCESS_KEY=$OCI_SECRET_ACCESS_KEY
JWT_SECRET=$JWT_SECRET
ALLOWED_ORIGINS=$ALLOWED_ORIGINS
OAUTH_PROVIDERS=$OAUTH_PROVIDERS
GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
GOOGLE_AUTH_URL=$GOOGLE_AUTH_URL
GOOGLE_TOKEN_URL=$GOOGLE_TOKEN_URL
GOOGLE_USERINFO_URL=$GOOGLE_USERINFO_URL
GOOGLE_REDIRECT_URL=$GOOGLE_REDIRECT_URL
PROPUBLICA_API_BASE_URL=$PROPUBLICA_API_BASE_URL
MISTRAL_API_ENDPOINT=$MISTRAL_API_ENDPOINT
MISTRAL_MODEL=$MISTRAL_MODEL
MISTRAL_API_KEY=$MISTRAL_API_KEY
NEW_RELIC_LICENSE_KEY=$NEW_RELIC_LICENSE_KEY
NEW_RELIC_OTLP_ENDPOINT=$NEW_RELIC_OTLP_ENDPOINT
NEW_RELIC_APP_NAME=deductible-tracker
OTEL_SERVICE_NAME=deductible-tracker
SITE_DOMAIN=dd.joshkraemer.com
EOF

          SECRETS_BASE64=$(base64 -w 0 /tmp/env_content)

          # 3. Merge deployment data into existing metadata
          echo "Fetching existing metadata..."
          EXISTING_METADATA=$(oci compute instance get --instance-id "$INSTANCE_OCID" --query "data.metadata" --output json || echo "{}")
          
          # Use jq to merge, handling potential nulls or empty objects
          UPDATED_METADATA=$(echo "$EXISTING_METADATA" | jq -c --arg image "$IMAGE_REF" --arg secrets "$SECRETS_BASE64" '\''
            if . == null then {} else . end | . + {deployed_image: $image, app_secrets: $secrets}
          '\'')

          echo "Updating instance metadata with new image reference..."
          # 4. Update OCI instance metadata with the latest deployment payload.
          oci compute instance update --instance-id "$INSTANCE_OCID" \
            --metadata "$UPDATED_METADATA" \
            --force
          
          echo "Deployment metadata updated successfully. The VM agent will pick it up within 60 seconds."
          exit 0
