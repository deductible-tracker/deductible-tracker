name: Build and Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.set-image-ref.outputs.image_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hardened Images
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            PREBUILD_TESTS=0
            NODE_ENV=production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=deploy-arm64
          cache-to: type=gha,mode=max,scope=deploy-arm64
          provenance: false
          sbom: false

      - name: Set image_ref build output
        id: set-image-ref
        run: |
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    environment: production
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_FILE }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - name: Install OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: 'iam compartment list --limit 1'
          silent: false

      - name: Update Instance Metadata Tag to Trigger Deploy
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CONNECT_STRING: ${{ secrets.DB_CONNECT_STRING }}
          OBJECT_STORAGE_ENDPOINT: ${{ secrets.OBJECT_STORAGE_ENDPOINT }}
          OBJECT_STORAGE_BUCKET: ${{ secrets.OBJECT_STORAGE_BUCKET }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY_ID }}
          OCI_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          OAUTH_PROVIDERS: ${{ secrets.OAUTH_PROVIDERS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_AUTH_URL: ${{ secrets.GOOGLE_AUTH_URL }}
          GOOGLE_TOKEN_URL: ${{ secrets.GOOGLE_TOKEN_URL }}
          GOOGLE_USERINFO_URL: ${{ secrets.GOOGLE_USERINFO_URL }}
          GOOGLE_REDIRECT_URL: ${{ secrets.GOOGLE_REDIRECT_URL }}
          PROPUBLICA_API_BASE_URL: ${{ secrets.PROPUBLICA_API_BASE_URL }}
          MISTRAL_API_ENDPOINT: ${{ secrets.MISTRAL_API_ENDPOINT }}
          MISTRAL_MODEL: ${{ secrets.MISTRAL_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_ref }}"
          
          # 1. Discover the active instance OCID
          # We search for instances that are NOT in the TERMINATED state.
          TARGET_COMPARTMENT="${{ secrets.OCI_COMPARTMENT_OCID }}"
          : "${TARGET_COMPARTMENT:=$OCI_CLI_TENANCY}"

          # Search by tag instead of display-name since names are timestamped
          INSTANCE_OCID=$(oci compute instance list --compartment-id "$TARGET_COMPARTMENT" \
            --lifecycle-state RUNNING \
            --query "data[?\"defined-tags\".\"Operations\".\"deployed_image\"].id | [0]" --raw-output)

          if [ -z "$INSTANCE_OCID" ] || [ "$INSTANCE_OCID" == "null" ]; then
            echo "ERROR: No RUNNING instance with tag project=deductible-tracker found in compartment $TARGET_COMPARTMENT"
            exit 1
          fi
          echo "Found active instance: $INSTANCE_OCID"

          # 2. Capture environment variables and encode them
          ENV_CONTENT=$(cat <<EOF
          DB_USER=$DB_USER
          DB_PASSWORD=$DB_PASSWORD
          DB_CONNECT_STRING=$DB_CONNECT_STRING
          MY_WALLET_DIRECTORY=/app/wallet
          TNS_ADMIN=/app/wallet
          OBJECT_STORAGE_ENDPOINT=$OBJECT_STORAGE_ENDPOINT
          OBJECT_STORAGE_BUCKET=$OBJECT_STORAGE_BUCKET
          OCI_REGION=$OCI_REGION
          OCI_ACCESS_KEY_ID=$OCI_ACCESS_KEY_ID
          OCI_SECRET_ACCESS_KEY=$OCI_SECRET_ACCESS_KEY
          JWT_SECRET=$JWT_SECRET
          ALLOWED_ORIGINS=$ALLOWED_ORIGINS
          OAUTH_PROVIDERS=$OAUTH_PROVIDERS
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          GOOGLE_AUTH_URL=$GOOGLE_AUTH_URL
          GOOGLE_TOKEN_URL=$GOOGLE_TOKEN_URL
          GOOGLE_USERINFO_URL=$GOOGLE_USERINFO_URL
          GOOGLE_REDIRECT_URL=$GOOGLE_REDIRECT_URL
          PROPUBLICA_API_BASE_URL=$PROPUBLICA_API_BASE_URL
          MISTRAL_API_ENDPOINT=$MISTRAL_API_ENDPOINT
          MISTRAL_MODEL=$MISTRAL_MODEL
          MISTRAL_API_KEY=$MISTRAL_API_KEY
          SITE_DOMAIN=dd.joshkraemer.com
          EOF
          )
          
          SECRETS_BASE64=$(echo "$ENV_CONTENT" | sed 's/^[[:space:]]*//' | base64 -w 0)
          
          # 2. Get existing metadata to preserve user_data
          # The OCI CLI update-instance command replaces ALL metadata if --metadata is used.
          # We must fetch the current user_data and include it in the update.
          EXISTING_METADATA=$(oci compute instance get --instance-id "$INSTANCE_OCID" --query "data.metadata" --output json)
          USER_DATA=$(echo "$EXISTING_METADATA" | jq -r '.user_data')
          
          # 3. Update OCI Instance Metadata with Image Reference, Secrets, and preserved User Data
          # We use --force because metadata updates still prompt for confirmation in the CLI.
          oci compute instance update --instance-id "$INSTANCE_OCID" \
            --metadata "{\"deployed_image\": \"$IMAGE_REF\", \"app_secrets\": \"$SECRETS_BASE64\", \"user_data\": \"$USER_DATA\"}" \
            --force
          exit 0
