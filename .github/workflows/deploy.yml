name: Build and Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.set-image-ref.outputs.image_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare DB wallet from secret
        env:
          WALLET_ZIP_BASE64: ${{ secrets.WALLET_ZIP_BASE64 }}
        run: |
          set -o pipefail
          if [ -n "$WALLET_ZIP_BASE64" ]; then
            mkdir -p Wallet_deductibledb
            # Ensure unzip is available; install if missing
            if ! command -v unzip >/dev/null 2>&1; then
              echo "unzip not found; installing unzip"
              sudo apt-get update
              sudo apt-get install -y unzip
            fi
            echo "unzip version:"
            if command -v unzip >/dev/null 2>&1; then unzip -v | head -n 1; fi
            # Safe diagnostics (do not echo the secret)
            echo "WALLET_ZIP_BASE64 length (chars):" "$(echo -n "$WALLET_ZIP_BASE64" | wc -c)"
            # Sanitize CRLFs and write base64 payload to a temporary file
            printf '%s' "$WALLET_ZIP_BASE64" | tr -d '\r' > /tmp/wallet.b64
            # Attempt to decode (support different base64 implementations)
            if ! (base64 --decode /tmp/wallet.b64 > /tmp/wallet.bin 2>/dev/null) && ! (base64 -d /tmp/wallet.b64 > /tmp/wallet.bin 2>/dev/null); then
              echo "Failed to base64-decode WALLET_ZIP_BASE64" >&2
              exit 1
            fi
            echo "Decoded to /tmp/wallet.bin (bytes):" "$(stat -c%s /tmp/wallet.bin 2>/dev/null || wc -c < /tmp/wallet.bin)"
            file -b /tmp/wallet.bin || true
            hexdump -C -n 16 /tmp/wallet.bin || true
            # Diagnostic listing using unzip if available
            if command -v unzip >/dev/null 2>&1; then
              echo "Archive listing (unzip -l):"
              unzip -l /tmp/wallet.bin || echo "unzip -l exit:$?"
            fi
            # Try ZIP/TAR extraction (prefer unzip; attempt extraction even if tests fail)
            if command -v unzip >/dev/null 2>&1; then
              if unzip -t /tmp/wallet.bin >/dev/null 2>&1; then
                unzip -qq /tmp/wallet.bin -d Wallet_deductibledb || { echo "unzip extraction failed with exit:$?"; unzip -l /tmp/wallet.bin || true; exit 1; }
                echo "Extracted wallet as zip"
              else
                echo "unzip -t failed; attempting extraction anyway"
                unzip /tmp/wallet.bin -d Wallet_deductibledb || { echo "unzip extraction failed with exit:$?"; unzip -l /tmp/wallet.bin || true; exit 1; }
                echo "Extracted wallet as zip (forced)"
              fi
            elif tar -tzf /tmp/wallet.bin >/dev/null 2>&1; then
              tar xzf /tmp/wallet.bin -C Wallet_deductibledb
              echo "Extracted wallet as tar.gz"
            elif tar -tf /tmp/wallet.bin >/dev/null 2>&1; then
              tar xf /tmp/wallet.bin -C Wallet_deductibledb
              echo "Extracted wallet as tar (uncompressed)"
            else
              # If decoded payload looks like text, attempt a second decode (double-encoded)
              if file -b /tmp/wallet.bin | grep -qi 'text'; then
                echo "Decoded payload looks like text; attempting double-decode..."
                if (base64 --decode /tmp/wallet.bin > /tmp/wallet2.bin 2>/dev/null) || (base64 -d /tmp/wallet.bin > /tmp/wallet2.bin 2>/dev/null); then
                  mv /tmp/wallet2.bin /tmp/wallet.bin
                  echo "Double-decoded; new size (bytes):" "$(stat -c%s /tmp/wallet.bin 2>/dev/null || wc -c < /tmp/wallet.bin)"
                  file -b /tmp/wallet.bin || true
                  hexdump -C -n 16 /tmp/wallet.bin || true
                  if command -v unzip >/dev/null 2>&1 && unzip -t /tmp/wallet.bin >/dev/null 2>&1; then
                    unzip -qq /tmp/wallet.bin -d Wallet_deductibledb
                    echo "Extracted wallet as zip (after double-decode)"
                    exit 0
                  elif tar -tzf /tmp/wallet.bin >/dev/null 2>&1; then
                    tar xzf /tmp/wallet.bin -C Wallet_deductibledb
                    echo "Extracted wallet as tar.gz (after double-decode)"
                    exit 0
                  elif tar -tf /tmp/wallet.bin >/dev/null 2>&1; then
                    tar xf /tmp/wallet.bin -C Wallet_deductibledb
                    echo "Extracted wallet as tar (uncompressed) (after double-decode)"
                    exit 0
                  fi
                else
                  echo "Double-decode attempt failed." >&2
                fi
              fi
              echo "Failed to extract wallet archive" >&2
              exit 1
            fi
          else
            echo "No WALLET_ZIP_BASE64 secret found; creating empty Wallet_deductibledb folder"
            mkdir -p Wallet_deductibledb
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            PREBUILD_TESTS=0
            NODE_ENV=production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=deploy-arm64
          cache-to: type=gha,mode=max,scope=deploy-arm64
          provenance: false
          sbom: false

      - name: Set image_ref build output
        id: set-image-ref
        run: |
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    environment: production
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_FILE }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - name: Install OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: 'iam compartment list --limit 1'
          silent: false

      - name: Update Instance Metadata Tag to Trigger Deploy
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CONNECT_STRING: ${{ secrets.DB_CONNECT_STRING }}
          OBJECT_STORAGE_ENDPOINT: ${{ secrets.OBJECT_STORAGE_ENDPOINT }}
          OBJECT_STORAGE_BUCKET: ${{ secrets.OBJECT_STORAGE_BUCKET }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_ACCESS_KEY_ID: ${{ secrets.OCI_ACCESS_KEY_ID }}
          OCI_SECRET_ACCESS_KEY: ${{ secrets.OCI_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          OAUTH_PROVIDERS: ${{ secrets.OAUTH_PROVIDERS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_AUTH_URL: ${{ secrets.GOOGLE_AUTH_URL }}
          GOOGLE_TOKEN_URL: ${{ secrets.GOOGLE_TOKEN_URL }}
          GOOGLE_USERINFO_URL: ${{ secrets.GOOGLE_USERINFO_URL }}
          GOOGLE_REDIRECT_URL: ${{ secrets.GOOGLE_REDIRECT_URL }}
          PROPUBLICA_API_BASE_URL: ${{ secrets.PROPUBLICA_API_BASE_URL }}
          MISTRAL_API_ENDPOINT: ${{ secrets.MISTRAL_API_ENDPOINT }}
          MISTRAL_MODEL: ${{ secrets.MISTRAL_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_OTLP_ENDPOINT: ${{ secrets.NEW_RELIC_OTLP_ENDPOINT }}
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_ref }}"

          # 1. Discover the active instance OCID
          # We search for instances that are NOT in the TERMINATED state.
          TARGET_COMPARTMENT="${{ secrets.OCI_COMPARTMENT_OCID }}"
          : "${TARGET_COMPARTMENT:=$OCI_CLI_TENANCY}"

          # Search by tag instead of display-name since names are timestamped
          INSTANCE_OCID=$(oci compute instance list --compartment-id "$TARGET_COMPARTMENT" \
            --lifecycle-state RUNNING \
            --query "data[?\"defined-tags\".\"Operations\".\"deployed_image\"].id | [0]" --raw-output)

          if [ -z "$INSTANCE_OCID" ] || [ "$INSTANCE_OCID" == "null" ]; then
            echo "ERROR: No RUNNING instance with tag project=deductible-tracker found in compartment $TARGET_COMPARTMENT"
            exit 1
          fi
          echo "Found active instance: $INSTANCE_OCID"

          # 2. Capture environment variables and encode them
          ENV_CONTENT=$(cat <<EOF
          DB_USER=$DB_USER
          DB_PASSWORD=$DB_PASSWORD
          DB_CONNECT_STRING=$DB_CONNECT_STRING
          GHCR_USERNAME=$GHCR_USERNAME
          GHCR_TOKEN=$GHCR_TOKEN
          DB_WALLET_DIR=/app/wallet
          OBJECT_STORAGE_ENDPOINT=$OBJECT_STORAGE_ENDPOINT
          OBJECT_STORAGE_BUCKET=$OBJECT_STORAGE_BUCKET
          OCI_REGION=$OCI_REGION
          OCI_ACCESS_KEY_ID=$OCI_ACCESS_KEY_ID
          OCI_SECRET_ACCESS_KEY=$OCI_SECRET_ACCESS_KEY
          JWT_SECRET=$JWT_SECRET
          ALLOWED_ORIGINS=$ALLOWED_ORIGINS
          OAUTH_PROVIDERS=$OAUTH_PROVIDERS
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          GOOGLE_AUTH_URL=$GOOGLE_AUTH_URL
          GOOGLE_TOKEN_URL=$GOOGLE_TOKEN_URL
          GOOGLE_USERINFO_URL=$GOOGLE_USERINFO_URL
          GOOGLE_REDIRECT_URL=$GOOGLE_REDIRECT_URL
          PROPUBLICA_API_BASE_URL=$PROPUBLICA_API_BASE_URL
          MISTRAL_API_ENDPOINT=$MISTRAL_API_ENDPOINT
          MISTRAL_MODEL=$MISTRAL_MODEL
          MISTRAL_API_KEY=$MISTRAL_API_KEY
          NEW_RELIC_LICENSE_KEY=$NEW_RELIC_LICENSE_KEY
          NEW_RELIC_OTLP_ENDPOINT=$NEW_RELIC_OTLP_ENDPOINT
          NEW_RELIC_APP_NAME=deductible-tracker
          OTEL_SERVICE_NAME=deductible-tracker
          SITE_DOMAIN=dd.joshkraemer.com
          EOF
          )

          SECRETS_BASE64=$(echo "$ENV_CONTENT" | sed 's/^[[:space:]]*//' | base64 -w 0)

          # 2. Merge deployment data into existing metadata so we preserve
          # SSH authorized keys and cloud-init user_data.
          EXISTING_METADATA=$(oci compute instance get --instance-id "$INSTANCE_OCID" --query "data.metadata" --output json)
          UPDATED_METADATA=$(echo "$EXISTING_METADATA" | jq -c --arg image "$IMAGE_REF" --arg secrets "$SECRETS_BASE64" '. + {deployed_image: $image, app_secrets: $secrets}')

          # 3. Update OCI instance metadata with the latest deployment payload.
          # We use --force because metadata updates still prompt for confirmation in the CLI.
          oci compute instance update --instance-id "$INSTANCE_OCID" \
            --metadata "$UPDATED_METADATA" \
            --force
          exit 0
