services:
  # One-shot migration service
  migrate:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: Dockerfile
    command: ./migrate
    env_file:
      - .env
    environment:
      - RUST_ENV=production
      - TNS_ADMIN=/app/wallet
    volumes:
      - ./Wallet_deductibledb:/app/wallet:ro
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - RUST_ENV=production
      - TNS_ADMIN=/app/wallet
      - RUST_LOG=deductible_tracker=debug,tower_http=debug
    volumes:
      - ./Wallet_deductibledb:/app/wallet:ro
    restart: always
