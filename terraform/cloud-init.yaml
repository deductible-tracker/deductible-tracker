#cloud-config
package_update: true
package_upgrade: true
packages:
  - curl
  - git
  - jq
  - oracle-cloud-agent
  - podman
  - podman-docker

write_files:
  - path: /usr/local/bin/poll-deploy.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/bin/bash
      # poll-deploy.sh: Lightweight agent to pull new image when OCI tag changes
      export PATH=/usr/sbin:/usr/bin:/sbin:/bin

      # Metadata URL for OCI (requires Auth Header for v2)
      METADATA_URL="http://169.254.169.254/opc/v2/instance/"

      # Path to state file
      STATE_FILE="/home/opc/.last_deployed_image"
      REPO_URL="https://github.com/deductible-tracker/deductible-tracker.git"
      REPO_DIR="/home/opc/deductible-tracker-src"

      build_image_from_source() {
          local revision
          revision="${TAGS##*:}"

          echo "Building $TAGS from source at $revision"
          if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "$REPO_URL" "$REPO_DIR" || return 1
          fi

          git -C "$REPO_DIR" fetch --depth 1 origin "$revision" || return 1
          git -C "$REPO_DIR" checkout --force "$revision" || return 1
          docker build -t "$TAGS" "$REPO_DIR"
      }

      # Fetch latest deployment data from instance metadata.
      # Fall back to defined tags so older instances continue to work.
      TAGS_JSON=$(curl -s -H "Authorization: Bearer Oracle" "$METADATA_URL")
      TAGS=$(echo "$TAGS_JSON" | jq -r '.metadata.deployed_image // .definedTags.Operations.deployed_image // empty')
      SECRETS_BASE64=$(echo "$TAGS_JSON" | jq -r '.metadata.app_secrets // .definedTags.Operations.app_secrets // empty')

      if [ -z "$TAGS" ] || [ "$TAGS" == "null" ] || [ "$TAGS" == "initial" ]; then
          echo "No valid image reference found in metadata tags."
          exit 0
      fi

      # Update secrets if present
      if [ -n "$SECRETS_BASE64" ] && [ "$SECRETS_BASE64" != "null" ]; then
          echo "Updating environment file from metadata..."
          echo "$SECRETS_BASE64" | base64 -d > /home/opc/app.env
          chmod 600 /home/opc/app.env
          chown opc:opc /home/opc/app.env
          /usr/local/bin/configure-newrelic-infra.sh || true
      fi

      # Compare with last deployed
      LAST_IMAGE=""
      if [ -f "$STATE_FILE" ]; then
          LAST_IMAGE=$(cat "$STATE_FILE")
      fi

      if [ "$TAGS" != "$LAST_IMAGE" ]; then
          echo "New deployment detected: $TAGS"

          GHCR_USERNAME_VALUE=$(grep '^GHCR_USERNAME=' /home/opc/app.env 2>/dev/null | cut -d'=' -f2-)
          GHCR_TOKEN_VALUE=$(grep '^GHCR_TOKEN=' /home/opc/app.env 2>/dev/null | cut -d'=' -f2-)
          if [ -n "$GHCR_USERNAME_VALUE" ] && [ -n "$GHCR_TOKEN_VALUE" ]; then
            echo "$GHCR_TOKEN_VALUE" | docker login ghcr.io -u "$GHCR_USERNAME_VALUE" --password-stdin
          fi

          # 1. Pull the new image
          if ! docker pull "$TAGS"; then
              echo "Failed to pull image $TAGS; attempting source build fallback"
              if ! build_image_from_source; then
                echo "Failed to build fallback image $TAGS"
                exit 1
              fi
          fi

          # 2. Blue/Green style swap (simple version)
          echo "Swapping containers..."
          docker stop deductible-app-old || true
          docker rename deductible-app deductible-app-old || true
          
          docker run -d \
            --name deductible-app \
            --restart always \
            --network=host \
            --env-file /home/opc/app.env \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            "$TAGS"
            
          # Check if started
          sleep 5
          if docker ps | grep -q deductible-app; then
              echo "Successfully deployed $TAGS"
              echo "$TAGS" > "$STATE_FILE"
              docker rm -f deductible-app-old || true
              
              # 3. Setup Caddy for HTTPS if domain is specified in environment
              SITE_DOMAIN=$(grep SITE_DOMAIN /home/opc/app.env | cut -d'=' -f2)
              if [ -n "$SITE_DOMAIN" ]; then
                echo "Setting up Caddy for $SITE_DOMAIN"
                docker rm -f caddy || true
                printf '%s\n' "${SITE_DOMAIN} {" '  reverse_proxy localhost:8080' '}' > /home/opc/Caddyfile
                
                docker run -d --name caddy --restart unless-stopped --network host \
                  -v /home/opc/Caddyfile:/etc/caddy/Caddyfile:z \
                  -v caddy_data:/data -v caddy_config:/config docker.io/library/caddy:2
              fi
          else
              echo "New container failed to start. Rolling back..."
              docker start deductible-app-old || true
              docker rename deductible-app-old deductible-app || true
              exit 1
          fi
      fi

  - path: /usr/local/bin/configure-newrelic-infra.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      APP_ENV="/home/opc/app.env"
      REPO_FILE="/etc/yum.repos.d/newrelic-infra.repo"
      CONFIG_FILE="/etc/newrelic-infra.yml"

      if [ ! -f "$APP_ENV" ]; then
          exit 0
      fi

      LICENSE_KEY=$(grep '^NEW_RELIC_LICENSE_KEY=' "$APP_ENV" 2>/dev/null | cut -d'=' -f2- || true)
      if [ -z "$LICENSE_KEY" ]; then
          if systemctl list-unit-files newrelic-infra.service >/dev/null 2>&1; then
              systemctl disable --now newrelic-infra >/dev/null 2>&1 || true
          fi
          exit 0
      fi

      if ! rpm -q newrelic-infra >/dev/null 2>&1; then
          rpm --import https://download.newrelic.com/infrastructure_agent/gpg/newrelic-infra.gpg
          cat > "$REPO_FILE" <<'EOF'
      [newrelic-infra]
      name=New Relic Infrastructure
      baseurl=https://download.newrelic.com/infrastructure_agent/linux/yum/el/9/$basearch
      enabled=1
      gpgcheck=1
      repo_gpgcheck=0
      gpgkey=https://download.newrelic.com/infrastructure_agent/gpg/newrelic-infra.gpg
      EOF
          dnf install -y newrelic-infra
      fi

      HOSTNAME_VALUE=$(hostnamectl --static 2>/dev/null || hostname)
      DEPLOY_ENV=$(grep '^RUST_ENV=' "$APP_ENV" 2>/dev/null | cut -d'=' -f2- || true)
      if [ -z "$DEPLOY_ENV" ]; then
          DEPLOY_ENV="production"
      fi

      cat > "$CONFIG_FILE" <<EOF
      license_key: ${LICENSE_KEY}
      display_name: ${HOSTNAME_VALUE}
      log:
        level: info
      custom_attributes:
        service: deductible-tracker
        environment: ${DEPLOY_ENV}
        provider: oracle
        runtime: docker
      EOF

      systemctl enable --now newrelic-infra
      systemctl restart newrelic-infra
  - path: /etc/systemd/system/deductible-deploy.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Deductible Tracker deploy poller
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/poll-deploy.sh

  - path: /etc/systemd/system/deductible-deploy.timer
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Poll OCI metadata for Deductible Tracker deployments

      [Timer]
      OnBootSec=30s
      OnUnitActiveSec=60s
      Unit=deductible-deploy.service

      [Install]
      WantedBy=timers.target
groups:
  - docker

system_info:
  default_user:
    groups: [docker]

runcmd:
  - systemctl stop cockpit.socket || true
  - systemctl disable cockpit.socket || true
  - usermod -aG docker opc
  - touch /etc/containers/nodocker
  # Configure host firewall for public web traffic only.
  - [
      sh,
      -c,
      'if systemctl is-active --quiet firewalld; then firewall-cmd --permanent --remove-service=ssh || true; firewall-cmd --permanent --remove-port=2222/tcp || true; firewall-cmd --permanent --add-service=http; firewall-cmd --permanent --add-service=https; firewall-cmd --reload; fi',
    ]
  # Setup OCI Logging Agent
  - [
      sh,
      -c,
      'systemctl enable --now oracle-cloud-agent && systemctl restart oracle-cloud-agent-updater',
    ]
  - [sh, -c, '/usr/local/bin/configure-newrelic-infra.sh || true']
  - systemctl daemon-reload
  - systemctl enable --now deductible-deploy.timer
  - systemctl start deductible-deploy.service
